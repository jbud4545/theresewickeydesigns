<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: #f6f1eb; }
    .frame { stroke: #d8cec2; stroke-opacity: 0.95; }
    .mark {
      fill: #5b4b3f;
      font-family: "Iowan Old Style", "Baskerville", Georgia, "Times New Roman", serif;
      font-size: 86px;
      font-weight: 600;
      letter-spacing: -10px;
    }

    @media (prefers-color-scheme: dark) {
      .bg { fill: #6a584c; }
      .frame { stroke: #cdbfb1; stroke-opacity: 0.45; }
      .mark { fill: #f6f1eb; }
    }
  </style>

  <rect class="bg" width="180" height="180" rx="38" />
  <rect class="frame" x="10" y="10" width="160" height="160" rx="30" stroke-width="2" />
  <text class="mark" x="50%" y="50%" text-anchor="middle" dominant-baseline="middle" dy="-0.05em">TW</text>
</svg>
